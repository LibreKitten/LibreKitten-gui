name: CI

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Push to Codeberg
      uses: yesolutions/mirror-action@v0.7.0
      with:
        REMOTE: https://codeberg.org/LibreKitten/LibreKitten-gui
        PUSH_ALL_REFS: false
        GIT_USERNAME: ${{ secrets.CB_USERNAME }}
        GIT_PASSWORD: ${{ secrets.CB_GIT_TOKEN }}
